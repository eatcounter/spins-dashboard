<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter | SPINS Analytics</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #f8f9fa; }
#auth-gate {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; gap: 24px;
}
#auth-gate h1 { font-size: 24px; font-weight: 800; letter-spacing: 2px; color: #1e293b; }
#auth-gate p { color: #64748b; font-size: 14px; max-width: 400px; text-align: center; }
#auth-error { color: #dc2626; font-size: 13px; display: none; }
#dashboard-frame { display: none; width: 100%; height: 100vh; border: none; }
</style>
</head>
<body>

<div id="auth-gate">
  <h1>COUNTER</h1>
  <p>SPINS Analytics Dashboard. Sign in with your @eatcounter.com Google account to continue.</p>
  <div id="g_id_onload"
    data-client_id="276164175939-osgitprijsjasvft5c1r9kb8d450vd9u.apps.googleusercontent.com"
    data-callback="handleAuth"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="sign_in_with"
    data-shape="rectangular"
    data-logo_alignment="left">
  </div>
  <div id="auth-error">Access denied. Only @eatcounter.com accounts are allowed.</div>
</div>

<iframe id="dashboard-frame" src="dashboard.html"></iframe>

<script>
var ALLOWED_EMAILS = ['jeff@eatcounter.com', 'benn@eatcounter.com'];

function handleAuth(response) {
  var payload = JSON.parse(atob(response.credential.split('.')[1]));
  var email = payload.email || '';

  if (ALLOWED_EMAILS.indexOf(email.toLowerCase()) !== -1) {
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('dashboard-frame').style.display = 'block';
  } else {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = 'Access denied. ' + email + ' is not authorized.';
  }
}
</script>

</body>
</html>
